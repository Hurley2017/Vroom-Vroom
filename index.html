<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vroom Vroom - E-Bike Engine Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            padding: 20px;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 2px;
            color: #ff3b30;
            text-shadow: 0 0 10px rgba(255, 59, 48, 0.5);
        }

        .engine-button {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 4px solid #ff3b30;
            background: radial-gradient(circle at 30% 30%, #ff6b5b, #cc2a1f);
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 30px rgba(255, 59, 48, 0.6), inset 0 0 20px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .engine-button:active {
            transform: scale(0.95);
            box-shadow: 0 0 50px rgba(255, 59, 48, 0.8);
        }

        .engine-button.running {
            background: radial-gradient(circle at 30% 30%, #34c759, #1fa737);
            border-color: #34c759;
            box-shadow: 0 0 30px rgba(52, 199, 89, 0.6), inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .stats-panel {
            background: rgba(30, 30, 30, 0.9);
            border: 2px solid #333;
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0;
            font-size: 14px;
            padding: 8px 0;
            border-bottom: 1px solid #444;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #aaa;
            font-weight: 600;
        }

        .stat-value {
            color: #ff3b30;
            font-weight: bold;
            font-size: 16px;
            font-family: 'Courier New', monospace;
        }

        .stat-value.green {
            color: #34c759;
        }

        .stat-value.blue {
            color: #00b4ff;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            color: #aaa;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #666;
            animation: none;
        }

        .status-dot.active {
            background-color: #34c759;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .info-box {
            background: rgba(255, 59, 48, 0.1);
            border-left: 4px solid #ff3b30;
            padding: 15px;
            border-radius: 5px;
            font-size: 12px;
            color: #ccc;
            width: 100%;
            max-width: 400px;
            margin-top: 10px;
            line-height: 1.5;
        }

        .warning {
            color: #ff3b30;
            font-weight: bold;
        }

        @media (orientation: portrait) {
            .title {
                font-size: 22px;
            }
            .engine-button {
                width: 150px;
                height: 150px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">🏍️ VROOM VROOM</div>
        
        <button class="engine-button" id="engineBtn">START<br>ENGINE</button>

        <div class="stats-panel">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Engine: OFF</span>
            </div>

            <div class="stat-row">
                <span class="stat-label">RPM (Throttle)</span>
                <span class="stat-value" id="rpmValue">0</span>
            </div>

            <div class="stat-row">
                <span class="stat-label">Acceleration</span>
                <span class="stat-value blue" id="accelValue">0.00 m/s²</span>
            </div>

            <div class="stat-row">
                <span class="stat-label">Rotation</span>
                <span class="stat-value blue" id="rotationValue">0.00 rad/s</span>
            </div>

            <div class="stat-row">
                <span class="stat-label">Motion Intensity</span>
                <span class="stat-value green" id="intensityValue">0%</span>
            </div>

            <div class="stat-row">
                <span class="stat-label">Volume</span>
                <span class="stat-value green" id="volumeValue">0%</span>
            </div>
        </div>

        <div class="info-box" id="infoBox">
            <div class="warning">⚠️ Requirements:</div>
            ✓ HTTPS connection<br>
            ✓ Mobile device (phone/tablet)<br>
            ✓ Latest browser (Chrome/Safari)<br>
            ✓ Pair TWS speakers via Bluetooth<br>
            ✓ Portrait or landscape orientation
        </div>
    </div>

    <script>
        const engineBtn = document.getElementById('engineBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const rpmValue = document.getElementById('rpmValue');
        const accelValue = document.getElementById('accelValue');
        const rotationValue = document.getElementById('rotationValue');
        const intensityValue = document.getElementById('intensityValue');
        const volumeValue = document.getElementById('volumeValue');
        const infoBox = document.getElementById('infoBox');

        let audioContext;
        let engineOscillators = [];
        let engineGains = [];
        let mechanicalGain;
        let masterGain;
        let backfireGain;
        let isEngineRunning = false;
        
        // Motion tracking
        let currentAcceleration = 0;
        let currentRotation = 0;
        let motionIntensity = 0;
        let smoothedRPM = 1200; // Start at idle RPM
        let previousRPM = 1200;
        let currentGear = 1;

        // Engine Constants - 4-Cylinder Mid-Stroke Engine
        const MIN_RPM = 1200;     // Idle RPM
        const MAX_RPM = 8000;     // Red line RPM
        const RPM_RANGE = MAX_RPM - MIN_RPM;
        const UPDATE_RATE = 50;   // ms
        const MOTION_SMOOTH = 0.4; // Lower = more responsive (increased for less jitter sensitivity)
        const RPM_ACCELERATION = 0.04; // How fast RPM climbs (slower = more realistic)
        const RPM_DECELERATION = 0.05; // How fast RPM drops
        const BACKFIRE_THRESHOLD = 0.3; // Motion threshold for backfire
        const ACCEL_DEADZONE = 1.5;  // Ignore accelerations below this (m/s²)
        const ROTATION_DEADZONE = 50; // Ignore rotations below this (rad/s)
        
        // Gear ratios - affects sound tone and responsiveness
        const GEAR_RATIOS = {
            1: { freqMultiplier: 0.85, volumeBoost: 1.1, torque: 1.3 },
            2: { freqMultiplier: 0.95, volumeBoost: 1.0, torque: 1.1 },
            3: { freqMultiplier: 1.0,  volumeBoost: 0.9, torque: 1.0 },
            4: { freqMultiplier: 1.05, volumeBoost: 0.85, torque: 0.9 },
            5: { freqMultiplier: 1.12, volumeBoost: 0.8, torque: 0.8 }
        };

        // Base frequencies for 4-cylinder engine (fire order adds personality)
        const BASE_FREQUENCIES = {
            fundamental: 120,  // Main engine note
            harmonic2: 240,    // 2x harmonic
            harmonic3: 360,    // 3x harmonic
            subBass: 60,       // Deep rumble
            firing: 200        // Firing frequency (4-cyl = 2x crankshaft)
        };

        let lastBackfireTime = 0;
        let backfireChance = 0;

        // Generate white noise (for mechanical sounds)
        class WhiteNoiseGenerator {
            constructor(context) {
                this.context = context;
                this.buffer = this.context.createBuffer(1, this.context.sampleRate * 2, this.context.sampleRate);
                let output = this.buffer.getChannelData(0);
                for (let i = 0; i < this.buffer.length; i++) {
                    output[i] = Math.random() * 2 - 1;
                }
            }

            play(time, duration, gain) {
                const source = this.context.createBufferSource();
                const gainNode = this.context.createGain();
                
                source.buffer = this.buffer;
                source.loop = true;
                source.connect(gainNode);
                gainNode.connect(mechanicalGain);
                
                gainNode.gain.setValueAtTime(gain, time);
                gainNode.gain.linearRampToValueAtTime(0, time + duration);
                
                source.start(time);
                source.stop(time + duration);
            }
        }

        let noiseGenerator;

        // Initialize audio context and synthetic engine
        async function initAudio() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioContext = new AudioContext();

            // Master volume control
            masterGain = audioContext.createGain();
            masterGain.gain.value = 0;
            masterGain.connect(audioContext.destination);

            // Mechanical sounds (valve clatter, compression noise)
            mechanicalGain = audioContext.createGain();
            mechanicalGain.gain.value = 0;
            mechanicalGain.connect(masterGain);

            // Backfire/pop channel (compression release)
            backfireGain = audioContext.createGain();
            backfireGain.gain.value = 0;
            backfireGain.connect(masterGain);

            noiseGenerator = new WhiteNoiseGenerator(audioContext);

            // Create oscillators for core engine sound (4-cylinder)
            const frequencies = [
                BASE_FREQUENCIES.subBass,     // Sub-bass rumble (0.5x)
                BASE_FREQUENCIES.fundamental, // Main tone (1x)
                BASE_FREQUENCIES.harmonic2,   // 2x harmonic
                BASE_FREQUENCIES.harmonic3,   // 3x harmonic
                BASE_FREQUENCIES.firing,      // Firing pulse (adds mechanical feel)
            ];

            const baseGains = [0.25, 0.5, 0.25, 0.12, 0.15]; // Relative amplitudes

            frequencies.forEach((freq, idx) => {
                const osc = audioContext.createOscillator();
                osc.type = idx === 4 ? 'square' : 'sine'; // Square wave for firing adds punch
                osc.frequency.value = freq;

                const gain = audioContext.createGain();
                gain.gain.value = baseGains[idx];

                osc.connect(gain);
                gain.connect(masterGain);

                osc.start();
                engineOscillators.push(osc);
                engineGains.push(gain);
            });

            // Mechanical valve clatter (initial noise burst)
            noiseGenerator.play(audioContext.currentTime + 0.1, 0.15, 0.2);

            isEngineRunning = true;
            smoothedRPM = MIN_RPM;
            previousRPM = MIN_RPM;
            updateUI();
        }

        // Stop audio and cleanup
        function stopAudio() {
            if (audioContext) {
                engineOscillators.forEach(osc => {
                    try { osc.stop(); } catch (e) {}
                });
                engineOscillators = [];
                engineGains = [];
                audioContext.close();
                audioContext = null;
            }
            isEngineRunning = false;
            currentAcceleration = 0;
            currentRotation = 0;
            motionIntensity = 0;
            smoothedRPM = MIN_RPM;
            previousRPM = MIN_RPM;
            updateUI();
        }

        // Auto-shift gears based on RPM
        function updateGear() {
            const rpmPercent = (smoothedRPM - MIN_RPM) / RPM_RANGE;
            
            // More realistic thresholds - shift up at 92% RPM, down at 45%
            if (rpmPercent > 0.92 && currentGear < 5) {
                currentGear++;
            } else if (rpmPercent < 0.45 && currentGear > 1) {
                currentGear--;
            }
        }

        // Trigger backfire/pop sound
        function triggerBackfire() {
            if (!audioContext) return;

            const now = audioContext.currentTime;
            if (now - lastBackfireTime < 0.15) return; // Debounce

            lastBackfireTime = now;

            // Create a sharp pop using filtered noise
            const noise = audioContext.createBufferSource();
            const buffer = audioContext.createBuffer(1, audioContext.sampleRate * 0.05, audioContext.sampleRate);
            const data = buffer.getChannelData(0);
            
            for (let i = 0; i < buffer.length; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (buffer.length / 3));
            }

            noise.buffer = buffer;
            
            const noisegain = audioContext.createGain();
            noisegain.gain.setValueAtTime(0.4, now);
            noisegain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
            
            noise.connect(noisegain);
            noisegain.connect(backfireGain);
            
            noise.start(now);
            noise.stop(now + 0.08);
        }

        // Process motion sensor data
        function handleMotion(event) {
            if (!isEngineRunning || !audioContext) return;

            // Get acceleration magnitude
            const accel = event.acceleration || { x: 0, y: 0, z: 0 };
            let accelMagnitude = Math.sqrt(
                Math.pow(accel.x || 0, 2) + 
                Math.pow(accel.y || 0, 2) + 
                Math.pow(accel.z || 0, 2)
            );

            // Get rotation magnitude (gyroscope)
            const rotation = event.rotationRate || { alpha: 0, beta: 0, gamma: 0 };
            let rotationMagnitude = Math.sqrt(
                Math.pow(rotation.alpha || 0, 2) + 
                Math.pow(rotation.beta || 0, 2) + 
                Math.pow(rotation.gamma || 0, 2)
            );

            // Apply deadzones to filter out noise and minor movements
            if (accelMagnitude < ACCEL_DEADZONE) accelMagnitude = 0;
            if (rotationMagnitude < ROTATION_DEADZONE) rotationMagnitude = 0;

            // Apply smoothing
            currentAcceleration = currentAcceleration * (1 - MOTION_SMOOTH) + 
                                  accelMagnitude * MOTION_SMOOTH;
            currentRotation = currentRotation * (1 - MOTION_SMOOTH) + 
                             rotationMagnitude * MOTION_SMOOTH;

            // Calculate motion intensity (0-1) with higher thresholds
            const accelIntensity = Math.min(currentAcceleration / 18, 1);
            const rotationIntensity = Math.min(currentRotation / 350, 1);
            motionIntensity = Math.max(accelIntensity, rotationIntensity);

            // Calculate target RPM (1200-8000)
            const targetRPM = MIN_RPM + (motionIntensity * RPM_RANGE);

            // Smooth RPM with realistic acceleration/deceleration
            let rpmDelta = (targetRPM - smoothedRPM) / RPM_RANGE;
            const smoothFactor = rpmDelta > 0 ? RPM_ACCELERATION : RPM_DECELERATION;
            smoothedRPM = smoothedRPM + (targetRPM - smoothedRPM) * smoothFactor;

            // Backfire logic: occurs on deceleration from high RPM
            if (previousRPM > 6000 && motionIntensity < BACKFIRE_THRESHOLD) {
                backfireChance += 0.05;
                if (Math.random() < backfireChance) {
                    triggerBackfire();
                    backfireChance = 0;
                }
            } else {
                backfireChance = 0;
            }

            previousRPM = smoothedRPM;
            updateGear();
            updateEngineSound();
        }

        // Update engine sound parameters
        function updateEngineSound() {
            if (!audioContext || engineOscillators.length === 0) return;

            // RPM to frequency mapping
            const rpmPercent = (smoothedRPM - MIN_RPM) / RPM_RANGE;
            const gearData = GEAR_RATIOS[currentGear];
            
            // Frequency scaling with gear consideration
            const frequencyMultiplier = gearData.freqMultiplier * (0.8 + rpmPercent * 1.2);

            // Update oscillator frequencies
            const baseFreqs = [
                BASE_FREQUENCIES.subBass,
                BASE_FREQUENCIES.fundamental,
                BASE_FREQUENCIES.harmonic2,
                BASE_FREQUENCIES.harmonic3,
                BASE_FREQUENCIES.firing,
            ];

            engineOscillators.forEach((osc, idx) => {
                const newFreq = baseFreqs[idx] * frequencyMultiplier;
                osc.frequency.setTargetAtTime(newFreq, audioContext.currentTime, 0.03);
            });

            // Volume dynamics
            const baseVolume = 0.4 + (rpmPercent * 0.5);
            const gearVolumeBoost = gearData.volumeBoost;
            
            // Mechanical clatter increases with RPM
            const mechanicalIntensity = rpmPercent * 0.25;
            mechanicalGain.gain.setTargetAtTime(
                mechanicalIntensity,
                audioContext.currentTime,
                0.05
            );

            // Master volume with gear consideration
            const targetMasterVolume = baseVolume * gearVolumeBoost;
            masterGain.gain.setTargetAtTime(
                targetMasterVolume,
                audioContext.currentTime,
                0.08
            );

            // Backfire volume
            backfireGain.gain.setTargetAtTime(
                0,
                audioContext.currentTime,
                0.1
            );
        }

        // Update UI display
        function updateUI() {
            if (isEngineRunning) {
                statusDot.classList.add('active');
                statusText.innerText = `Engine: RUNNING (Gear ${currentGear})`;
                engineBtn.classList.add('running');
                engineBtn.innerText = 'STOP\nENGINE';
            } else {
                statusDot.classList.remove('active');
                statusText.innerText = 'Engine: OFF';
                engineBtn.classList.remove('running');
                engineBtn.innerText = 'START\nENGINE';
            }

            rpmValue.innerText = Math.round(smoothedRPM).toLocaleString();
            accelValue.innerText = currentAcceleration.toFixed(2) + ' m/s²';
            rotationValue.innerText = currentRotation.toFixed(2) + ' rad/s';
            const rpmPercent = ((smoothedRPM - MIN_RPM) / RPM_RANGE * 100);
            intensityValue.innerText = rpmPercent.toFixed(0) + '%';
            volumeValue.innerText = rpmPercent.toFixed(0) + '%';
        }

        // Request motion permission and start listening
        async function requestMotionPermission() {
            if (typeof DeviceMotionEvent !== 'undefined') {
                if (typeof DeviceMotionEvent.requestPermission === 'function') {
                    // iOS 13+
                    try {
                        const permission = await DeviceMotionEvent.requestPermission();
                        if (permission === 'granted') {
                            window.addEventListener('devicemotion', handleMotion);
                            infoBox.innerHTML = '<div class="warning">✓ Motion sensors active | Gears: Auto 1-5 | RPM: 1200-8000</div>';
                        } else {
                            infoBox.innerHTML = '<div class="warning">✗ Motion permission denied</div>';
                        }
                    } catch (error) {
                        console.error('Permission error:', error);
                    }
                } else {
                    // Other devices
                    window.addEventListener('devicemotion', handleMotion);
                    infoBox.innerHTML = '<div class="warning">✓ Motion sensors active | Gears: Auto 1-5 | RPM: 1200-8000</div>';
                }
            } else {
                infoBox.innerHTML = '<div class="warning">✗ Device motion not supported</div>';
            }
        }

        // UI animation update loop
        setInterval(updateUI, UPDATE_RATE);

        // Engine button handler
        engineBtn.addEventListener('click', async () => {
            if (!isEngineRunning) {
                try {
                    await initAudio();
                    await requestMotionPermission();
                } catch (error) {
                    console.error('Initialization error:', error);
                    infoBox.innerHTML = '<div class="warning">✗ Error initializing audio</div>';
                }
            } else {
                stopAudio();
                window.removeEventListener('devicemotion', handleMotion);
            }
        });

        // Initial UI update
        updateUI();

        // Log support info
        console.log('🏍️ Vroom Vroom Engine Simulator');
        console.log('RPM Range: 1200-8000 (4-Cylinder Mid-Stroke)');
        console.log('Gears: 5 (Auto-shifting)');
        console.log('Features: Backfire, Mechanical Clatter, Realistic Dynamics');
        console.log('Browser Audio Context:', window.AudioContext ? 'Supported' : 'Not Supported');
        console.log('Device Motion:', typeof DeviceMotionEvent !== 'undefined' ? 'Supported' : 'Not Supported');
    </script>
</body>
</html>
