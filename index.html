<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>E-Bike Revver</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #throttleBtn {
            background-color: #ff3b30;
            color: white;
            border: none;
            border-radius: 50%;
            width: 200px;
            height: 200px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(255, 59, 48, 0.4);
            transition: transform 0.1s;
        }
        #throttleBtn:active {
            transform: scale(0.95);
        }
        #status {
            margin-top: 30px;
            font-size: 18px;
            color: #aaaaaa;
        }
    </style>
</head>
<body>

    <button id="throttleBtn">START ENGINE</button>
    <div id="status">Engine: OFF</div>

    <script>
        const throttleBtn = document.getElementById('throttleBtn');
        const statusText = document.getElementById('status');
        
        let audioContext;
        let engineSource;
        let isEngineRunning = false;

        // Replace this URL with a direct link to your looping engine MP3 file
        const audioUrl = 'https://actions.google.com/sounds/v1/transportation/car_engine_loop.ogg'; 

        async function initAudio() {
            // iOS requires window.webkitAudioContext
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioContext = new AudioContext();

            try {
                statusText.innerText = "Loading engine sound...";
                const response = await fetch(audioUrl);
                const arrayBuffer = await response.arrayBuffer();
                const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

                engineSource = audioContext.createBufferSource();
                engineSource.buffer = audioBuffer;
                engineSource.loop = true; // Make the engine sound loop seamlessly
                engineSource.connect(audioContext.destination);
                engineSource.start(0);
                
                isEngineRunning = true;
                throttleBtn.innerText = "STOP ENGINE";
                throttleBtn.style.backgroundColor = "#34c759";
                statusText.innerText = "Engine: IDLE";
                
            } catch (error) {
                statusText.innerText = "Error loading sound.";
                console.error(error);
            }
        }

        async function requestMotionPermission() {
            // iOS 13+ requires explicit permission to use the accelerometer
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceMotionEvent.requestPermission();
                    if (permissionState === 'granted') {
                        window.addEventListener('devicemotion', handleMotion);
                    } else {
                        statusText.innerText = "Motion permission denied.";
                    }
                } catch (error) {
                    console.error("Error requesting motion permission:", error);
                }
            } else {
                // Non-iOS 13+ devices
                window.addEventListener('devicemotion', handleMotion);
            }
        }

        function handleMotion(event) {
            if (!isEngineRunning || !engineSource) return;

            // Depending on how you mount the iPhone 11 on the handlebars, 
            // you may need to use event.acceleration.y or .z
            let acceleration = event.acceleration.y; 
            
            // If the accelerometer returns null, fallback to calculating it using gravity
            if (acceleration === null) {
                acceleration = event.accelerationIncludingGravity.y;
            }

            // Calculate pitch based on acceleration
            // Using Math.abs so it revs whether accelerating forward or braking hard
            let pitch = 1.0 + (Math.abs(acceleration) / 10); 

            // Cap the max pitch so it doesn't sound distorted
            if (pitch > 2.5) pitch = 2.5; 

            // Smoothly change the playback rate (pitch) of the audio
            engineSource.playbackRate.value = pitch;
            
            statusText.innerText = `Pitch: ${pitch.toFixed(2)}x`;
        }

        throttleBtn.addEventListener('click', () => {
            if (!isEngineRunning) {
                // AudioContext MUST be created/resumed upon a user click in iOS
                initAudio().then(() => {
                    requestMotionPermission();
                });
            } else {
                // Stop the engine
                if (engineSource) {
                    engineSource.stop();
                    engineSource.disconnect();
                }
                isEngineRunning = false;
                window.removeEventListener('devicemotion', handleMotion);
                throttleBtn.innerText = "START ENGINE";
                throttleBtn.style.backgroundColor = "#ff3b30";
                statusText.innerText = "Engine: OFF";
            }
        });
    </script>
</body>
</html>
